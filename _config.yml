############################
# --- Required options --- #
############################

title: "Home"
description: "A blog about things I learn at the keyboard: DevOps, CI/CD, Cloud, Automation, to name a few..."
baseurl: "/"
url: "https://marcusfelling.com"
author: Marcus Felling

navbar-links:
  Archives: "archives"


#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  rss: true  # remove this line if you don't want to show an RSS link at the bottom
  github: marcusfelling
  linkedin: marcusfelling
# If you want your website to generate an RSS feed, provide a description
# The URL for the feed will be https://<your_website>/feed.xml

###########################
# --- General options --- #
###########################

# The keywords to associate with your website, for SEO purposes
keywords: "DevOps,CI/CD,Azure DevOps,GitHub Actions,Playwright,Infrastructure as Code,Terraform,Bicep,Azure Pipelines,Test Automation,Cloud Engineering"

################
# --- Misc --- #
################

# Ruby Date Format to show dates of posts
date_format: "%B %-d, %Y"

#################################################################################
# --- You don't need to touch anything below here (but you can if you want) --- #
#################################################################################

# Output options (more information on Jekyll's site)
timezone: "America/Toronto"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/

kramdown:
  input: GFM

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  -
    scope:
      path: "" # any file that's not a post will be a "page" layout by default
    values:
      layout: "page"

# Exclude these files from production site
exclude:
  - _config-dev.yml
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - README.md
  - docs/
  - node_modules
  - playwright-report
  - playwright.config.ts
  - tests/
  - package.json
  - package-lock.json
  - squad.config.ts
  - .github/
  - .gitignore
  - .squad/
  - LICENSE

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

include:
  - .well-known

# Skip HTML compression in development (compress.html is expensive)
compress_html:
  ignore:
    envs: development

# Enable incremental regeneration (only rebuild changed files)
incremental: true
